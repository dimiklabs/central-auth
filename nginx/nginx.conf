events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Security ──────────────────────────────────────────────────────────────
    server_tokens off;                          # hide nginx version
    client_max_body_size 64k;                   # login form only — no file uploads
    client_body_timeout  10s;
    client_header_timeout 10s;
    keepalive_timeout    65s;
    send_timeout         10s;

    # Rate limit zone: 5 login requests/minute per IP, 10 MB state table.
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
    limit_req_status 429;

    # ── Common security headers for all responses ──────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                             always;
    add_header X-Frame-Options         "DENY"                                always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

    # ── Proxy defaults ─────────────────────────────────────────────────────────
    proxy_connect_timeout  5s;
    proxy_read_timeout    30s;
    proxy_send_timeout    10s;
    proxy_http_version    1.1;
    proxy_set_header      Connection "";

    # ── Landing page ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name centralauth.local;
        root /var/www/app;
        index index.html;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'" always;
    }

    # ── Auth frontend ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name auth.centralauth.local;
        root /var/www/auth;
        index index.html;
        try_files $uri $uri/ /index.html;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src http://api.auth.centralauth.local:8080; frame-ancestors 'none'" always;
    }

    # ── Auth API ──────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.auth.centralauth.local;

        # Rate-limit /login: 5 req/min per IP, burst of 3 queued, rest rejected.
        location /login {
            limit_req zone=login_zone burst=3 nodelay;

            proxy_pass         http://auth:4000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;

            # Auth responses must never be cached.
            add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        }

        location / {
            proxy_pass         http://auth:4000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;

            add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        }
    }

    # ── Analytics frontend ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name analytics.centralauth.local;
        root /var/www/analytics;
        index index.html;
        try_files $uri $uri/ /index.html;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src http://api.analytics.centralauth.local:8080 http://auth.centralauth.local:8080; frame-ancestors 'none'" always;
    }

    # ── Analytics API ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.analytics.centralauth.local;

        location / {
            proxy_pass         http://analytics:4002;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;
        }
    }

    # ── Report frontend ───────────────────────────────────────────────────────
    server {
        listen 80;
        server_name report.centralauth.local;
        root /var/www/report;
        index index.html;
        try_files $uri $uri/ /index.html;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src http://api.report.centralauth.local:8080 http://auth.centralauth.local:8080; frame-ancestors 'none'" always;
    }

    # ── Report API ────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.report.centralauth.local;

        location / {
            proxy_pass         http://report:4001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;
        }
    }

    # ── Transaction frontend ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name transaction.centralauth.local;
        root /var/www/transaction;
        index index.html;
        try_files $uri $uri/ /index.html;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src http://api.transaction.centralauth.local:8080 http://auth.centralauth.local:8080; frame-ancestors 'none'" always;
    }

    # ── Transaction API ───────────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.transaction.centralauth.local;

        location / {
            proxy_pass         http://transaction:4003;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;
        }
    }
}
