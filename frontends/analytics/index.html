<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — Central Auth</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; color: #1e293b; }
    nav {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .brand { font-weight: 700; color: #0891b2; font-size: .95rem; margin-right: auto; }
    nav a {
      text-decoration: none;
      color: #475569;
      font-size: .875rem;
      font-weight: 500;
      padding: .375rem .625rem;
      border-radius: 6px;
      transition: background .15s, color .15s;
    }
    nav a:hover { background: #f1f5f9; color: #1e293b; }
    .logout { color: #dc2626 !important; }
    .logout:hover { background: #fef2f2 !important; }
    .user-chip {
      font-size: .8rem;
      color: #64748b;
      background: #f1f5f9;
      padding: .25rem .75rem;
      border-radius: 99px;
    }
    main { max-width: 900px; margin: 2.5rem auto; padding: 0 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .375rem; }
    .subtitle { color: #64748b; font-size: .9rem; margin-bottom: 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.25rem; margin-bottom: 2rem; }
    .stat { background: #fff; border-radius: 10px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .stat-label { font-size: .8rem; color: #64748b; font-weight: 500; margin-bottom: .5rem; text-transform: uppercase; letter-spacing: .04em; }
    .stat-value { font-size: 2rem; font-weight: 700; color: #0891b2; }
    .stat-delta { font-size: .8rem; color: #16a34a; margin-top: .25rem; }
    .stat-delta.down { color: #dc2626; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    th { background: #f8fafc; text-align: left; padding: .875rem 1.25rem; font-size: .8125rem; color: #64748b; font-weight: 600; border-bottom: 1px solid #e2e8f0; }
    td { padding: .875rem 1.25rem; font-size: .875rem; border-bottom: 1px solid #f1f5f9; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
    .bar-wrap { background: #e2e8f0; border-radius: 99px; height: 8px; }
    .bar { background: #0891b2; border-radius: 99px; height: 8px; }
    .loading { color: #94a3b8; font-size: .9rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">⬡ Central Auth Demo</span>
    <a href="http://report.centralauth.local:8080">Reports</a>
    <a href="http://transaction.centralauth.local:8080">Transactions</a>
    <a href="http://api.auth.centralauth.local:8080/logout" class="logout">Logout</a>
    <span class="user-chip" id="userChip">…</span>
  </nav>

  <main id="content">
    <p class="loading">Loading…</p>
  </main>

  <script>
    const API  = 'http://api.analytics.centralauth.local:8080';
    const AUTH = 'http://auth.centralauth.local:8080';

    // Escape all user-controlled values before inserting into innerHTML.
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // clamp share value to 0-100 so style="width:X%" is safe.
    function safeShare(n) {
      const v = Number(n);
      return (Number.isFinite(v) ? Math.max(0, Math.min(100, v)) : 0);
    }

    async function load() {
      let resp;
      try {
        resp = await fetch(API + '/analytics', { credentials: 'include' });
      } catch {
        document.getElementById('content').innerHTML = '<p class="loading">Could not reach API.</p>';
        return;
      }

      if (resp.status === 401) {
        window.location.href = AUTH + '?return_to=' + encodeURIComponent(window.location.href);
        return;
      }

      const data = await resp.json();
      document.getElementById('userChip').textContent = data.email;
      render(data);
    }

    function render(data) {
      const statsHtml = data.stats.map(s => `
        <div class="stat">
          <div class="stat-label">${esc(s.label)}</div>
          <div class="stat-value">${esc(s.value)}</div>
          <div class="stat-delta ${s.up ? '' : 'down'}">${esc(s.delta)}</div>
        </div>`).join('');

      const rowsHtml = data.channels.map(ch => `
        <tr>
          <td>${esc(ch.name)}</td>
          <td>${esc(ch.sessions)}</td>
          <td>${esc(ch.share)}%</td>
          <td><div class="bar-wrap"><div class="bar" style="width:${safeShare(ch.share)}%"></div></div></td>
        </tr>`).join('');

      const main = document.getElementById('content');
      main.innerHTML = `
        <h1>Analytics</h1>
        <p class="subtitle">Logged in as <strong>${esc(data.email)}</strong></p>
        <div class="grid">${statsHtml}</div>
        <table>
          <thead>
            <tr><th>Channel</th><th>Sessions</th><th>Share</th><th></th></tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>`;
    }

    load();
  </script>
</body>
</html>
