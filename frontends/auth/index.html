<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Central Auth</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .logo { font-size: 1.1rem; font-weight: 600; color: #4f46e5; margin-bottom: 1.75rem; letter-spacing: -.01em; }
    h1 { font-size: 1.5rem; font-weight: 600; color: #111; margin-bottom: .375rem; }
    .subtitle { font-size: .9rem; color: #6b7280; margin-bottom: 1.75rem; }
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: .75rem 1rem;
      border-radius: 6px;
      font-size: .875rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .error.visible { display: block; }
    label { display: block; font-size: .8125rem; font-weight: 500; color: #374151; margin-bottom: .375rem; }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: .625rem .875rem;
      font-size: .9375rem;
      color: #111;
      margin-bottom: 1.125rem;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.15); }
    button {
      width: 100%;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: .75rem;
      font-size: .9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
      margin-top: .25rem;
    }
    button:hover { background: #4338ca; }
    .hint { margin-top: 1.5rem; font-size: .8125rem; color: #9ca3af; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⬡ Central Auth</div>
    <h1>Sign in</h1>
    <p class="subtitle">Use any demo account below</p>

    <div class="error" id="errorMsg"></div>

    <form id="loginForm" method="POST" action="http://api.auth.centralauth.local:8080/login">
      <input type="hidden" name="return_to" id="returnTo">

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="alice@example.com" required autofocus>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="demo123" required>

      <button type="submit">Sign in</button>
    </form>

    <p class="hint">alice / bob / carol @example.com · password: demo123</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const returnTo = params.get('return_to') || 'http://analytics.centralauth.local:8080';
    const error = params.get('error');

    document.getElementById('returnTo').value = returnTo;

    if (error) {
      const el = document.getElementById('errorMsg');
      el.textContent = error;
      el.classList.add('visible');
    }
  </script>
</body>
</html>
