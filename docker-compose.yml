services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: centralauth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./auth-service/db/seed.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./auth-service
    ports:
      - "4000:4000"
    environment:
      DB_DSN: postgres://postgres:postgres@postgres:5432/centralauth?sslmode=disable
      JWT_SECRET: super-secret-dev-key-change-in-prod
      COOKIE_MAX_AGE: "86400"
      COOKIE_DOMAIN: .centralauth.local
      AUTH_FRONTEND_URL: http://auth.centralauth.local:8080
      DEFAULT_REDIRECT_URL: http://analytics.centralauth.local:8080
      ALLOWED_ORIGIN: http://auth.centralauth.local:8080
      PORT: "4000"
    depends_on:
      postgres:
        condition: service_healthy

  report-service:
    build: ./report-service
    ports:
      - "4001:4001"
    environment:
      JWT_SECRET: super-secret-dev-key-change-in-prod
      ALLOWED_ORIGIN: http://report.centralauth.local:8080
      PORT: "4001"
    depends_on:
      - auth-service

  analytics-service:
    build: ./analytics-service
    ports:
      - "4002:4002"
    environment:
      JWT_SECRET: super-secret-dev-key-change-in-prod
      ALLOWED_ORIGIN: http://analytics.centralauth.local:8080
      PORT: "4002"
    depends_on:
      - auth-service

  transaction-service:
    build: ./transaction-service
    ports:
      - "4003:4003"
    environment:
      JWT_SECRET: super-secret-dev-key-change-in-prod
      ALLOWED_ORIGIN: http://transaction.centralauth.local:8080
      PORT: "4003"
    depends_on:
      - auth-service

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app:/var/www/app:ro
      - ./frontends/auth:/var/www/auth:ro
      - ./frontends/analytics:/var/www/analytics:ro
      - ./frontends/report:/var/www/report:ro
      - ./frontends/transaction:/var/www/transaction:ro
    depends_on:
      - auth-service
      - analytics-service
      - report-service
      - transaction-service
