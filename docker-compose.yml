services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: centralauth
      POSTGRES_USER: centralauth_user
      POSTGRES_PASSWORD: "dev-pg-p@ssw0rd-2024!"
    ports:
      - "5433:5432"         # debug access only — remove in production
    volumes:
      - ./auth/db/seed.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U centralauth_user -d centralauth"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256m

  auth:
    build: ./auth
    ports:
      - "4000:4000"         # debug access only — remove in production
    environment:
      # SECURITY: Replace with `openssl rand -hex 32` output before deploying.
      DB_DSN: "postgres://centralauth_user:dev-pg-p@ssw0rd-2024!@postgres:5432/centralauth?sslmode=disable"
      JWT_SECRET: "dev-jwt-secret-replace-with-openssl-rand-hex-32-output"
      COOKIE_MAX_AGE: "86400"
      COOKIE_DOMAIN: ".centralauth.local"
      AUTH_FRONTEND_URL: "http://auth.centralauth.local:8080"
      DEFAULT_REDIRECT_URL: "http://analytics.centralauth.local:8080"
      ALLOWED_ORIGIN: "http://auth.centralauth.local:8080"
      PORT: "4000"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m

  report:
    build: ./report
    ports:
      - "4001:4001"         # debug access only — remove in production
    environment:
      # SECURITY: Must match auth JWT_SECRET exactly.
      JWT_SECRET: "dev-jwt-secret-replace-with-openssl-rand-hex-32-output"
      ALLOWED_ORIGIN: "http://report.centralauth.local:8080"
      PORT: "4001"
    depends_on:
      - auth
    deploy:
      resources:
        limits:
          memory: 64m

  analytics:
    build: ./analytics
    ports:
      - "4002:4002"         # debug access only — remove in production
    environment:
      # SECURITY: Must match auth JWT_SECRET exactly.
      JWT_SECRET: "dev-jwt-secret-replace-with-openssl-rand-hex-32-output"
      ALLOWED_ORIGIN: "http://analytics.centralauth.local:8080"
      PORT: "4002"
    depends_on:
      - auth
    deploy:
      resources:
        limits:
          memory: 64m

  transaction:
    build: ./transaction
    ports:
      - "4003:4003"         # debug access only — remove in production
    environment:
      # SECURITY: Must match auth JWT_SECRET exactly.
      JWT_SECRET: "dev-jwt-secret-replace-with-openssl-rand-hex-32-output"
      ALLOWED_ORIGIN: "http://transaction.centralauth.local:8080"
      PORT: "4003"
    depends_on:
      - auth
    deploy:
      resources:
        limits:
          memory: 64m

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontends/app:/var/www/app:ro
      - ./frontends/auth:/var/www/auth:ro
      - ./frontends/analytics:/var/www/analytics:ro
      - ./frontends/report:/var/www/report:ro
      - ./frontends/transaction:/var/www/transaction:ro
    depends_on:
      - auth
      - analytics
      - report
      - transaction
    deploy:
      resources:
        limits:
          memory: 64m

volumes:
  pgdata:
