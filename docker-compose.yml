services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: centralauth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./auth-service/db/seed.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./auth-service
    ports:
      - "4000:4000"
    environment:
      DB_DSN: postgres://postgres:postgres@postgres:5432/centralauth?sslmode=disable
      JWT_SECRET: super-secret-dev-key-change-in-prod
      COOKIE_MAX_AGE: "86400"
      PORT: "4000"
    depends_on:
      postgres:
        condition: service_healthy

  report-service:
    build: ./report-service
    ports:
      - "4001:4001"
    environment:
      JWT_SECRET: super-secret-dev-key-change-in-prod
      AUTH_SERVICE_URL: http://localhost:4000
      ANALYTICS_SERVICE_URL: http://localhost:4002
      TRANSACTION_SERVICE_URL: http://localhost:4003
      PORT: "4001"
    depends_on:
      - auth-service

  analytics-service:
    build: ./analytics-service
    ports:
      - "4002:4002"
    environment:
      JWT_SECRET: super-secret-dev-key-change-in-prod
      AUTH_SERVICE_URL: http://localhost:4000
      REPORT_SERVICE_URL: http://localhost:4001
      TRANSACTION_SERVICE_URL: http://localhost:4003
      PORT: "4002"
    depends_on:
      - auth-service

  transaction-service:
    build: ./transaction-service
    ports:
      - "4003:4003"
    environment:
      JWT_SECRET: super-secret-dev-key-change-in-prod
      AUTH_SERVICE_URL: http://localhost:4000
      REPORT_SERVICE_URL: http://localhost:4001
      ANALYTICS_SERVICE_URL: http://localhost:4002
      PORT: "4003"
    depends_on:
      - auth-service

  app:
    image: nginx:alpine
    ports:
      - "5173:80"
    volumes:
      - ./app:/usr/share/nginx/html:ro
